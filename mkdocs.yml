site_name: Kalshi Trading Bot
site_description: Open-source algorithmic trading framework for Kalshi prediction markets — by Viprasol Tech.
site_url: https://viprasol-tech.github.io/kalshi-trading-bot
repo_url: https://github.com/Viprasol-Tech/kalshi-trading-bot
repo_name: Viprasol-Tech/kalshi-trading-bot
copyright: Copyright &copy; 2025 Viprasol Tech Private Limited

theme:
  name: material
  logo: assets/logo.png
  favicon: assets/logo.png
  palette:
    - scheme: default
      primary: teal
      accent: teal
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: teal
      accent: teal
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.top
    - content.code.copy
    - search.suggest

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Configuration: configuration.md
  - Strategies: strategies.md
  - Backtesting: backtesting.md

markdown_extensions:
  - admonition
  - pymdownx.highlight
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true

plugins:
  - search

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/Viprasol-Tech
    - icon: fontawesome/brands/telegram
      link: https://t.me/viprasol_help
    - icon: fontawesome/brands/linkedin
      link: https://www.linkedin.com/in/viprasol/
