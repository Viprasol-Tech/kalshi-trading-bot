name: 🐛 Bug report
description: Report a problem with the Kalshi Trading Bot
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: Thanks for taking the time to file a bug! Please do **not** include API keys or private keys.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug and what you expected instead.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Run `kalshi-bot ...`
        2. See error ...
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      description: Output of `kalshi-bot version`
    validations:
      required: true
  - type: dropdown
    id: environment
    attributes:
      label: Environment
      options: [demo, prod]
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Relevant log output (redact any secrets).
      render: shell
